name: Daily Ingestion Scheduler

on:
  schedule:
    # Run daily at 10:00 AM IST (4:30 AM UTC)
    - cron: '30 4 * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions tab

permissions:
  contents: write

jobs:
  ingest:
    name: Run Ingestion & Re-Index
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      API_HOST: 127.0.0.1
      API_PORT: 8000
      DEBUG: "True"
      LLM_PROVIDER: groq
      GROQ_MODEL: llama-3.3-70b-versatile
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      SIMILARITY_THRESHOLD: 0.30
      TOP_K_CONTEXT: 3

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          python -m unittest discover -v tests

      - name: Run Scheduler Ingestion (One-Off)
        run: |
          python -m src.data.scheduler --run-once

      - name: Commit & Push Ingestion Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add modified directories that are ignored by default in .gitignore
          git add -f data/processed/checksums.json
          git add -f data/vector_db/local_db.json
          git add -f data/processed/
          git add -f data/raw/
          
          # Check if there are actual changes staged to commit
          if git diff --cached --quiet; then
            echo "No updates or modified fund data detected. Skipping commit."
          else
            git commit -m "Automated Ingestion Update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin HEAD:main
          fi

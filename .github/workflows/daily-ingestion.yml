name: Daily Ingestion Scheduler

on:
  push:
    branches: [ main ]
  schedule:
    # Run daily at 10:00 AM IST (4:30 AM UTC)
    - cron: '30 4 * * *'
  workflow_dispatch:
    # Allow manual triggering from the GitHub Actions tab

permissions:
  contents: write

jobs:
  ingest:
    name: Run Ingestion & Re-Index
    runs-on: ubuntu-latest

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      API_HOST: 127.0.0.1
      API_PORT: 8000
      DEBUG: "True"
      LLM_PROVIDER: groq
      GROQ_MODEL: llama-3.3-70b-versatile
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      SIMILARITY_THRESHOLD: 0.15
      TOP_K_CONTEXT: 3
      FORCE_FALLBACK: "True"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: |
          python -m unittest discover -v tests > test_output.log 2>&1

      - name: Upload Test Logs on Failure
        if: failure()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add -f test_output.log
          git commit -m "Capture CI Test Failures Log"
          git push origin HEAD:main

      - name: Run Scheduler Ingestion (One-Off)
        run: |
          python -m src.data.scheduler --run-once

      - name: Commit & Push Ingestion Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add modified directories/files that are ignored by default in .gitignore if they exist
          [ -f data/processed/checksums.json ] && git add -f data/processed/checksums.json || true
          [ -f data/vector_db/local_db.json ] && git add -f data/vector_db/local_db.json || true
          [ -d data/processed ] && git add -f data/processed/ || true
          [ -d data/raw ] && git add -f data/raw/ || true
          
          # Check if there are actual changes staged to commit
          if git diff --cached --quiet; then
            echo "No updates or modified fund data detected. Skipping commit."
          else
            git commit -m "Automated Ingestion Update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin HEAD:main
          fi
